name: Action402 settlement canary

on:
  schedule:
    - cron: "17 3 */3 * *"

permissions:
  contents: read

concurrency:
  group: action402-settlement-canary
  cancel-in-progress: false

jobs:
  settlement-canary:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ACTION402_CANARY_BASE_URL: https://action402.vercel.app
      ACTION402_CANARY_MAX_AMOUNT: "0.01"
      ACTION402_CANARY_SCENARIO: scheduled-settlement-canary
      AGENTCASH_WALLET_JSON_B64: ${{ secrets.AGENTCASH_WALLET_JSON_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore AgentCash wallet
        run: |
          if [ -z "$AGENTCASH_WALLET_JSON_B64" ]; then
            echo "AGENTCASH_WALLET_JSON_B64 is missing. Add a small funded AgentCash wallet as a GitHub Actions secret."
            exit 1
          fi
          mkdir -p "$HOME/.agentcash"
          printf '%s' "$AGENTCASH_WALLET_JSON_B64" | base64 -d > "$HOME/.agentcash/wallet.json"
          chmod 600 "$HOME/.agentcash/wallet.json"

      - name: Run paid settlement canary
        run: npm run settlement:canary
